version: '3.9'

services:
  # Oracle Database Service
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: cptm_oracle
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: root
      ORACLE_CHARACTERSET: AL32UTF8
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - cptm_network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1521' 2>/dev/null && echo OK || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # .NET 8 API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cptm_api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      DOTNET_RUNNING_IN_CONTAINER: "true"

      # Oracle — ASP.NET Core maps ConnectionStrings__LocalConnection -> ConnectionStrings:LocalConnection
      ConnectionStrings__LocalConnection: "Data Source=oracle:1521/XEPDB1;User ID=CPTM;Password=root;"

      # JWT — ASP.NET Core maps Jwt__SecretKey -> Jwt:SecretKey
      Jwt__SecretKey: "df9e4cccd2384e6a7d095ec9525dd55df3ea15508f7054ecff238a9d28767b26"
      Jwt__Issuer: "cptm-api"
      Jwt__Audience: "cptm-web"
      Jwt__ExpiresMinutes: "120"

      # Logging
      Logging__LogLevel__Default: "Warning"
      Logging__LogLevel__Microsoft.AspNetCore: "Warning"
    depends_on:
      oracle:
        condition: service_healthy
    networks:
      - cptm_network
    restart: unless-stopped

  # pgAdmin (Optional - for database visualization)
  # Uncomment if you want a visual database tool
  # db_admin:
  #   image: phpmyadmin:latest
  #   container_name: cptm_db_admin
  #   ports:
  #     - "8080:80"
  #   environment:
  #     PMA_HOST: oracle
  #     PMA_USER: CPTM
  #     PMA_PASSWORD: root
  #   depends_on:
  #     - oracle
  #   networks:
  #     - cptm_network

networks:
  cptm_network:
    driver: bridge

volumes:
  oracle_data:
    driver: local
