# Carrega automaticamente o arquivo .env no mesmo diretório.
# Copie .env.example para .env e preencha os valores antes de rodar.

services:

  # ── Oracle Database ──────────────────────────────────────────────
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: cptm_oracle
    ports:
      - "1522:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      ORACLE_CHARACTERSET: AL32UTF8
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./init-oracle.sql:/container-entrypoint-initdb.d/01_create_cptm_user.sql:ro
    networks:
      - cptm_network
    # Healthcheck verifica que o usuário CPTM existe e consegue fazer login —
    # garante que o init-oracle.sql rodou antes da API subir.
    healthcheck:
      test: ["CMD-SHELL", "echo EXIT | sqlplus -s CPTM/$${ORACLE_PASSWORD}@//localhost:1521/XEPDB1 > /dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
    restart: unless-stopped

  # ── .NET 9 API ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cptm_api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_RUNNING_IN_CONTAINER: "true"

      # Conexão Oracle — mapeia para ConnectionStrings:LocalConnection
      ConnectionStrings__LocalConnection: "Data Source=oracle:1521/XEPDB1;User ID=CPTM;Password=${ORACLE_PASSWORD};"

      # JWT — mapeia para Jwt:*
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: "cptm-api"
      Jwt__Audience: "cptm-web"
      Jwt__ExpiresMinutes: "120"

      # CORS — permite frontend Docker na porta 8080
      Cors__AllowedOrigins__0: "http://localhost:8080"
      Cors__AllowedOrigins__1: "http://localhost:5173"

      # Logs reduzidos em produção
      Logging__LogLevel__Default: "Warning"
      Logging__LogLevel__Microsoft.AspNetCore: "Warning"
    volumes:
      # Persiste chaves de DataProtection entre reinicializações do container
      - api_keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      oracle:
        condition: service_healthy
    networks:
      - cptm_network
    restart: unless-stopped

  # ── Vue / Vite / PWA Frontend ────────────────────────────────────
  frontend:
    build:
      context: ../CPTMFront
      dockerfile: Dockerfile
      args:
        # URL que o BROWSER usa para chamar a API (não a rede interna Docker)
        VITE_API_BASE_URL: http://localhost:5000
    container_name: cptm_frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - cptm_network
    restart: unless-stopped

networks:
  cptm_network:
    driver: bridge

volumes:
  oracle_data:
    driver: local
  api_keys:
    driver: local
