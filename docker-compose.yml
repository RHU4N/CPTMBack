version: '3.9'

services:
  # Oracle Database Service
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: cptm_oracle
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: root
      ORACLE_CHARACTERSET: AL32UTF8
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./init-db.sql:/opt/oracle/scripts/startup/init-db.sql:ro
    networks:
      - cptm_network
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "system/root@localhost:1521/XEPDB1", "AS", "sysdba", "SELECT", "1", "FROM", "dual"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # .NET 8 API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cptm_api
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000;https://+:5001
      DOTNET_RUNNING_IN_CONTAINER: "true"

      # Oracle Configuration
      ORACLE_HOST: oracle
      ORACLE_PORT: 1521
      ORACLE_SID: XEPDB1
      ORACLE_USER: CPTM
      ORACLE_PASSWORD: root

      # JWT Configuration
      JWT_SECRET_KEY: your_super_secret_jwt_key_here_min_32_characters
      JWT_ISSUER: CPTMBackend
      JWT_AUDIENCE: CPTMApp
      JWT_EXPIRATION_MINUTES: 60

      # Logging
      LOG_LEVEL: Information
    depends_on:
      oracle:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - cptm_network
    restart: unless-stopped
    command: /bin/bash -c "dotnet restore && dotnet build && dotnet run"

  # pgAdmin (Optional - for database visualization)
  # Uncomment if you want a visual database tool
  # db_admin:
  #   image: phpmyadmin:latest
  #   container_name: cptm_db_admin
  #   ports:
  #     - "8080:80"
  #   environment:
  #     PMA_HOST: oracle
  #     PMA_USER: CPTM
  #     PMA_PASSWORD: root
  #   depends_on:
  #     - oracle
  #   networks:
  #     - cptm_network

networks:
  cptm_network:
    driver: bridge

volumes:
  oracle_data:
    driver: local
